<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} · {{ site.Title }}{{ end }}</title>
  <meta name="description" content="A neighborhood lending library in San Francisco — borrow kid & travel gear, party supplies, kids' costumes, and puzzles & games for free.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  {{ with resources.Get "css/main.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ .RelPermalink }}">
  {{ end }}
  <script>window.SFLL = { apiUrl: {{ site.Params.apiUrl }}, home: {{ site.Home.RelPermalink }} };</script>
</head>
<body{{ with .Params.key }} data-lib-key="{{ . }}"{{ end }}>
{{ block "main" . }}{{ end }}
{{ partial "contact-modal.html" . }}
{{ with resources.Get "js/common.js" | minify | fingerprint }}
<script src="{{ .RelPermalink }}"></script>
{{ end }}
{{ block "scripts" . }}{{ end }}
</body>
</html>
