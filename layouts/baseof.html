<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} · {{ site.Title }}{{ end }}</title>
  <meta name="description" content="A neighborhood lending library in San Francisco — borrow kid & travel gear, party supplies, kids' costumes, and puzzles & games for free.">
  {{ if .Params.noindex }}<meta name="robots" content="noindex, nofollow">{{ end }}
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#C0392B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lending Library">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Special+Elite&display=swap" rel="stylesheet">
  {{ with resources.Get "css/main.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ .RelPermalink }}">
  {{ end }}
  <script>window.SFLL = { apiUrl: {{ site.Params.apiUrl }}, home: {{ site.Home.RelPermalink }} };</script>
</head>
<body{{ with .Params.key }} data-lib-key="{{ . }}"{{ end }}>
{{ block "main" . }}{{ end }}
{{ partial "contact-modal.html" . }}
{{ with resources.Get "js/common.js" | minify | fingerprint }}
<script src="{{ .RelPermalink }}"></script>
{{ end }}
{{ block "scripts" . }}{{ end }}
</body>
</html>
