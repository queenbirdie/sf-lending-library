{{/* Renders a stroke-only category icon for the given library key. Usage: {{ partial "lib-icon.html" "kid-gear" }} */}}
{{ $key := . }}
{{ if eq $key "kid-gear" }}
<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <rect x="4.5" y="7" width="15" height="9.5" rx="1.2"/>
  <path d="M7.5 7v9.5M10.5 7v9.5M13.5 7v9.5M16.5 7v9.5"/>
  <path d="M4.5 16.5v3M19.5 16.5v3"/>
</svg>
{{ else if eq $key "party" }}
<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <ellipse cx="6.3" cy="9" rx="3.4" ry="4.2"/>
  <ellipse cx="12" cy="6" rx="3.7" ry="4.6"/>
  <ellipse cx="17.7" cy="9" rx="3.4" ry="4.2"/>
  <path d="M6.3 13.2L12 18M12 10.6L12 18M17.7 13.2L12 18"/>
  <circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/>
  <path d="M12 19V21.5"/>
</svg>
{{ else if eq $key "costumes" }}
<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <path d="M4 11c0-3 2-5 4.5-5s3.3 1.8 3.5 2c.2-.2 1-2 3.5-2s4.5 2 4.5 5c0 2-1.5 3.5-4 3.5-1.8 0-2.8-1-3.5-2-.7 1-1.7 2-3.5 2-2.5 0-4-1.5-4-3.5z"/>
  <circle cx="7.6" cy="10" r="0.9" fill="currentColor" stroke="none"/>
  <circle cx="16.4" cy="10" r="0.9" fill="currentColor" stroke="none"/>
  <path d="M17.3 13.8c1.4.4 2.3 1.8 1.9 3.2"/>
  <path d="M19.8 18.6l1.7 1.7"/>
</svg>
{{ else if eq $key "puzzles" }}
<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <path d="M5,5 L9,5 A3,3 0 0,1 15,5 L19,5 L19,9 A3,3 0 0,0 19,15 L19,19 L5,19 Z"/>
</svg>
{{ else if eq $key "yoto" }}
<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <rect x="4" y="7" width="16" height="14" rx="3.5"/>
  <rect x="9.3" y="3" width="5.4" height="3.2" rx="0.8"/>
  <circle cx="12" cy="15" r="4.3"/>
  <path d="M9.8 15.6c.5.9 1.4 1.4 2.2 1.4s1.7-.5 2.2-1.4"/>
  <circle cx="10" cy="13.8" r="0.5" fill="currentColor" stroke="none"/>
  <circle cx="14" cy="13.8" r="0.5" fill="currentColor" stroke="none"/>
</svg>
{{ end }}
